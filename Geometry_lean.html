<!DOCTYPE html>
<html lang="pl">
<head>
    <!-- Ten znacznik jest kluczowy, aby symbole takie jak ∀, ∃, ⊢ wyświetlały się poprawnie -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Kod w Lean 4</title>
    
    <style>
        /* Dodatkowe opcjonalne style, aby strona ładnie wyglądała na ekranie */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 {
            color: #111;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        /* Styl dla bloku kodu, który wkleisz z VS Code */
        .kod-kontener {
            margin: 20px 0;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <h1>Przykładowy program w Lean 4</h1>
    <p>Poniżej znajduje się statyczna prezentacja kodu wyeksportowana bezpośrednio z edytora:</p>

        <!-- Wklej zawartość schowka dokładnie w tym miejscu (Zastąp ten komentarz swoim kodem) -->

</html>
